<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Image Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .upload-section {
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-box:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-box.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        #fileInput {
            display: none;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-section {
            padding: 20px 40px;
            display: none;
        }

        .preview-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .results-section {
            padding: 40px;
            display: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .result-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .result-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .result-info {
            padding: 15px;
        }

        .result-rank {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-score {
            float: right;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .result-title {
            font-size: 0.95em;
            margin: 10px 0;
            line-height: 1.4;
            height: 2.8em;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .result-price {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            display: none;
        }

        .stats {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 10px 20px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👗 Fashion Image Search</h1>
            <p>이미지를 업로드하면 유사한 패션 상품을 찾아드립니다</p>
        </div>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📤</div>
                <h2>이미지를 드래그하거나 클릭해서 업로드</h2>
                <p style="margin-top: 10px; color: #666;">JPG, PNG 파일 지원</p>
            </div>
            <input type="file" id="fileInput" accept="image/*">

            <div style="margin-top: 20px;">
                <label>결과 개수: </label>
                <select id="topK" style="padding: 8px; border-radius: 5px; border: 2px solid #667eea;">
                    <option value="6">6개</option>
                    <option value="9" selected>9개</option>
                    <option value="12">12개</option>
                    <option value="15">15개</option>
                    <option value="20">20개</option>
                </select>
            </div>
        </div>

        <div class="preview-section" id="previewSection">
            <h3>업로드한 이미지:</h3>
            <div style="margin-top: 15px;">
                <img id="previewImage" class="preview-image" alt="Preview">
            </div>
            <div style="margin-top: 20px;">
                <button class="btn" onclick="searchImage()">🔍 검색 시작</button>
                <button class="btn" onclick="reset()">🔄 다시 선택</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <h3>검색 중...</h3>
            <p>유사한 상품을 찾고 있습니다</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results-section" id="resultsSection">
            <h2>검색 결과</h2>
            <div class="stats" id="stats"></div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001/search/upload';
        let selectedFile = null;

        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultsSection = document.getElementById('resultsSection');
        const resultsGrid = document.getElementById('resultsGrid');
        const stats = document.getElementById('stats');

        // 파일 선택 처리
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // 드래그 앤 드롭
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        function handleFile(file) {
            selectedFile = file;

            // 미리보기
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewSection.style.display = 'block';
                resultsSection.style.display = 'none';
                error.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        async function searchImage() {
            if (!selectedFile) return;

            // UI 업데이트
            loading.style.display = 'block';
            resultsSection.style.display = 'none';
            error.style.display = 'none';

            // FormData 생성
            const formData = new FormData();
            formData.append('file', selectedFile);

            const topK = document.getElementById('topK').value;

            try {
                const response = await fetch(`${API_URL}?top_k=${topK}`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data);

            } catch (err) {
                error.textContent = `에러 발생: ${err.message}`;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(data) {
            const results = data.results || [];

            // 통계 표시
            stats.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${results.length}</div>
                    <div class="stat-label">검색 결과</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${data.file_size ? Math.round(data.file_size / 1024) : 0}KB</div>
                    <div class="stat-label">업로드 크기</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${results[0]?.score.toFixed(3) || 'N/A'}</div>
                    <div class="stat-label">최고 유사도</div>
                </div>
            `;

            // 결과 카드 생성
            resultsGrid.innerHTML = results.map((item, idx) => `
                <div class="result-card">
                    <img src="${item.image_url}" alt="${item.title}" class="result-image"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22300%22><rect fill=%22%23ddd%22 width=%22280%22 height=%22300%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22>이미지 로드 실패</text></svg>'">
                    <div class="result-info">
                        <span class="result-rank">#${idx + 1}</span>
                        <span class="result-score">유사도: ${item.score.toFixed(3)}</span>
                        <div class="result-title">${item.title}</div>
                        <div class="result-price">₩${item.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');

            resultsSection.style.display = 'block';
        }

        function reset() {
            selectedFile = null;
            fileInput.value = '';
            previewSection.style.display = 'none';
            resultsSection.style.display = 'none';
            error.style.display = 'none';
        }
    </script>
</body>
</html>
