version: '3.8'

services:
  fashion-search:
    build: .
    container_name: fashion-search-api
    ports:
      - "8001:8001"
    volumes:
      # 데이터는 외부 볼륨으로 마운트 (컨테이너 재시작해도 유지)
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./results:/app/results
      - ./logs:/app/logs
    environment:
      # CPU 모드 (GPU 없는 환경)
      - DEVICE=cpu
      - USE_FAISS=true
      - API_PORT=8001
      - LOG_LEVEL=INFO
    restart: unless-stopped
    # 리소스 제한 (선택사항)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  embed-api:
    build:
      context: .
      dockerfile: Dockerfile.embed
    container_name: fashion-embed-api
    ports:
      - "8002:8002"
    volumes:
      # style_classifier.pt 등 체크포인트를 외부에서 마운트
      - ./checkpoints:/app/checkpoints
    environment:
      - DEVICE=cpu
      - LOG_LEVEL=INFO
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 4G

